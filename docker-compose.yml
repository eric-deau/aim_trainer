services:
  db:
    image: mysql:8.0.41
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PW}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PW}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -u${DB_USER} -p${DB_PW} -e 'SELECT 1' ${DB_NAME} >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PW}@db:3306/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"

volumes:
  mysql_data:
